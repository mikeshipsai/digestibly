services:
  db:
    image: alpine:3.20
    container_name: digestibly_db
    command: ["sh", "-c", "mkdir -p /data && touch /data/debug_posts.sqlite3 && tail -f /dev/null"]
    restart: unless-stopped
    volumes:
      - ../data:/data

  init:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: digestibly_init
    profiles: ["init"]
    depends_on:
      - db
    env_file:
      - ../.env
    environment:
      SQLITE_PATH: /data/debug_posts.sqlite3
      TELETHON_SESSION_NAME: /data/telegram_digest_userbot
    volumes:
      - ../data:/data
    command: ["python", "-m", "scripts.telethon_login"]

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: digestibly_bot
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ../.env
    environment:
      SQLITE_PATH: /data/debug_posts.sqlite3
      TELETHON_SESSION_NAME: /data/telegram_digest_userbot
    volumes:
      - ../data:/data
